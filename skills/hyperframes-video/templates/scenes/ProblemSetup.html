<section
  class="scene scene-problem-setup"
  data-bg="vignette"
  data-clip-id="{{clipId}}"
  data-duration="{{durationSeconds}}"
>
  <style>
    .scene-problem-setup {
      justify-content: center;
    }
    .scene-problem-setup .evidence-wall {
      display: grid;
      grid-template-columns: repeat({{evidenceColumnCount}}, 1fr);
      gap: 48px;
      margin-top: 48px;
    }
    .scene-problem-setup .evidence-card {
      padding: 32px 36px;
      border-radius: 16px;
      background: color-mix(in srgb, var(--brand-background) 60%, transparent);
      border: 1px solid color-mix(in srgb, var(--brand-text) 12%, transparent);
      transform: rotate(var(--tilt, 0deg));
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }
    .scene-problem-setup .evidence-card .label {
      font-size: 22px;
      font-family: var(--brand-font-code);
      color: var(--brand-muted);
      margin-bottom: 8px;
    }
    .scene-problem-setup .evidence-card .value {
      font-size: 38px;
      font-weight: 700;
      color: var(--brand-text);
    }
    .scene-problem-setup .evidence-card .glyph {
      position: absolute;
      font-size: 28px;
      color: var(--brand-danger);
    }
    .scene-problem-setup .scene-tagline {
      margin-top: 56px;
      align-self: center;
      text-align: center;
    }
    .scene-problem-setup .scene-headline {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      max-width: 80%;
    }
  </style>

  <h2 class="scene-headline">{{headlineHtml}}</h2>
  <div class="evidence-wall">
{{evidenceCardsHtml}}
  </div>
  {{taglineBlock}}

  <script>
    (function () {
      const root = document.querySelector('[data-clip-id="{{clipId}}"]');
      if (!root || !window.gsap) return;
      const dur = parseFloat(root.dataset.duration) || 5;
      const cards = root.querySelectorAll(".evidence-card");
      const tagline = root.querySelector(".scene-tagline");
      const tl = window.gsap.timeline({ defaults: { ease: "power3.out" } });

      tl.from(root.querySelector(".scene-headline"), { y: 30, opacity: 0, duration: 0.5 }, 0);
      // Stagger evidence cards in with random delays - "chaos" feel matches the message
      cards.forEach((card, i) => {
        const delay = 0.4 + i * 0.18 + Math.random() * 0.05;
        tl.from(card, { y: 60, opacity: 0, scale: 0.94, duration: 0.55 }, delay);
      });
      // Fly-in tagline lands AFTER all evidence has arrived (Storytelling Rule 6)
      if (tagline) {
        const taglineStart = dur * 0.7;
        tl.from(tagline, { y: 24, opacity: 0, duration: 0.6 }, taglineStart);
      }
    })();
  </script>
</section>
