<!--
  UIShowcase scene.

  This scene branches by media kind:
    - data-media-kind="image" → renders an <img>
    - data-media-kind="video" → renders an autoplaying, muted, looping <video>

  The skill writes ONE of the two media blocks below into the file at scaffold
  time based on the chosen mediaKind. Callouts are kinetic overlays positioned
  by percentage (Phase 3.5 option 2 in the spec).

  Background is "flat" because the captured UI carries the visual; a glow or
  gradient would compete. This is the explicit-opt-in flat variant per Layout
  Rule 1, documented here.
-->
<section
  class="scene scene-ui-showcase"
  data-bg="flat"
  data-clip-id="{{clipId}}"
  data-duration="{{durationSeconds}}"
  data-media-kind="{{mediaKind}}"
>
  <style>
    .scene-ui-showcase {
      align-items: center;
      justify-content: center;
      padding: 60px;
      gap: 36px;
    }
    .scene-ui-showcase .media-frame {
      position: relative;
      max-width: 90%;
      max-height: 70%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45),
        0 0 0 1px color-mix(in srgb, var(--brand-text) 12%, transparent);
    }
    .scene-ui-showcase .media-frame img,
    .scene-ui-showcase .media-frame video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .scene-ui-showcase .callout {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 14px 22px;
      border-radius: 12px;
      background: color-mix(in srgb, var(--brand-background) 80%, transparent);
      border: 2px solid var(--brand-primary);
      color: var(--brand-text);
      font-size: 26px;
      font-weight: 600;
      box-shadow: 0 0 30px color-mix(in srgb, var(--brand-primary) 40%, transparent);
      opacity: 0;
    }
    .scene-ui-showcase .scene-caption {
      align-self: center;
      text-align: center;
      max-width: 80%;
    }
  </style>

  <div class="media-frame">
{{mediaElementHtml}}
{{calloutsHtml}}
  </div>
  <p class="scene-caption">{{captionHtml}}</p>

  <script>
    (function () {
      const root = document.querySelector('[data-clip-id="{{clipId}}"]');
      if (!root || !window.gsap) return;
      const dur = parseFloat(root.dataset.duration) || 6;
      const callouts = root.querySelectorAll(".callout");
      const tl = window.gsap.timeline({ defaults: { ease: "power3.out" } });

      tl.from(root.querySelector(".media-frame"), { y: 30, opacity: 0, duration: 0.5 }, 0);

      // Callouts arrive across the middle 40-60% of the scene
      const calloutStart = dur * 0.4;
      const calloutWindow = dur * 0.4;
      const slot = callouts.length > 0 ? calloutWindow / callouts.length : 0;
      callouts.forEach((el, i) => {
        tl.to(
          el,
          { opacity: 1, y: 0, scale: 1, duration: 0.45 },
          calloutStart + i * slot
        );
      });

      tl.from(root.querySelector(".scene-caption"), { y: 20, opacity: 0, duration: 0.4 }, dur * 0.7);
    })();
  </script>
</section>
