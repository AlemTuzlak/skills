<!--
  BulletList scene.

  IMPORTANT (Storytelling Rule 1): this scene is NOT a plain stacked vertical
  list. The default treatment is tilted "evidence cards" with random tilt and
  a connection glyph between them. The skill upgrades the layout (scattered
  funnel, race lane, packet flow, etc.) when the items map to a known motif.

  If you find yourself simplifying this back into a stacked list, stop and
  re-read SKILL.md "Storytelling Rule 1: No plain bullet lists".
-->
<section
  class="scene scene-bullet-list"
  data-bg="primary-glow"
  data-clip-id="{{clipId}}"
  data-duration="{{durationSeconds}}"
>
  <style>
    .scene-bullet-list {
      justify-content: center;
    }
    .scene-bullet-list .scene-headline {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.1;
      max-width: 80%;
    }
    .scene-bullet-list .card-cluster {
      display: grid;
      grid-template-columns: repeat({{itemColumnCount}}, 1fr);
      gap: 56px;
      margin-top: 56px;
    }
    [data-aspect="vertical"] .scene-bullet-list .card-cluster {
      grid-template-columns: 1fr;
      gap: 36px;
    }
    .scene-bullet-list .item-card {
      position: relative;
      padding: 36px 40px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transform: rotate(var(--tilt, 0deg));
      box-shadow: 0 16px 60px rgba(0, 0, 0, 0.3);
    }
    .scene-bullet-list .item-glyph {
      position: absolute;
      top: -22px;
      left: 28px;
      font-size: 44px;
      color: var(--brand-primary);
      filter: drop-shadow(0 0 16px color-mix(in srgb, var(--brand-primary) 40%, transparent));
    }
    .scene-bullet-list .item-text {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--brand-text);
    }
    .scene-bullet-list .scene-tagline {
      margin-top: 56px;
      align-self: center;
      text-align: center;
      max-width: 80%;
    }
  </style>

  <h2 class="scene-headline">{{headlineHtml}}</h2>
  <div class="card-cluster">
{{itemCardsHtml}}
  </div>
  {{taglineBlock}}

  <script>
    (function () {
      const root = document.querySelector('[data-clip-id="{{clipId}}"]');
      if (!root || !window.gsap) return;
      const dur = parseFloat(root.dataset.duration) || 5;
      const cards = root.querySelectorAll(".item-card");
      const tagline = root.querySelector(".scene-tagline");

      const tl = window.gsap.timeline({ defaults: { ease: "power3.out" } });
      tl.from(root.querySelector(".scene-headline"), { y: 30, opacity: 0, duration: 0.5 }, 0);

      // Vary the entrance per card so the rhythm doesn't feel uniform (Rule 5)
      cards.forEach((card, i) => {
        const delay = 0.4 + i * 0.16 + Math.random() * 0.08;
        const xOffset = (i % 2 === 0 ? -30 : 30) + (Math.random() * 20 - 10);
        tl.from(card, { x: xOffset, y: 50, opacity: 0, duration: 0.55 }, delay);
      });

      if (tagline) {
        tl.from(tagline, { y: 24, opacity: 0, duration: 0.5 }, dur * 0.7);
      }
    })();
  </script>
</section>
